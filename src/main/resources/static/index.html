<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodies Cart + Checkout</title>
  <style>
    :root {
      --bg-1: #fef6e4;
      --bg-2: #f3d2c1;
      --card: #fffffe;
      --text: #172c66;
      --muted: #5f6c7b;
      --accent: #f582ae;
      --accent-2: #8bd3dd;
      --danger: #d7263d;
      --ok: #2a9d8f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, var(--bg-2), transparent 35%),
                  radial-gradient(circle at 90% 10%, var(--accent-2), transparent 25%),
                  var(--bg-1);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, 94vw);
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.4rem, 3.4vw, 2.3rem);
      letter-spacing: 0.5px;
    }

    .pill {
      background: var(--card);
      border: 2px solid #0000001a;
      border-radius: 999px;
      padding: 8px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input, button, textarea {
      font: inherit;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #00000024;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 2px solid #00000012;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 20px #00000010;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .product {
      border: 1px solid #00000020;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
      animation: fadeIn .35s ease;
    }

    .product img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: #eee;
    }

    .product .content {
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .space {
      justify-content: space-between;
    }

    .muted { color: var(--muted); font-size: .92rem; }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      background: var(--accent);
      color: #001;
      font-weight: 700;
    }

    button.secondary { background: var(--accent-2); }
    button.danger { background: #ffd4d9; color: var(--danger); }
    button.success { background: #c9f0eb; color: #053a34; }

    .cart-item {
      border-bottom: 1px dashed #00000022;
      padding: 8px 0;
      display: grid;
      gap: 6px;
    }

    .cart-item:last-child { border-bottom: 0; }

    .stack { display: grid; gap: 10px; }

    .status {
      min-height: 18px;
      font-size: .9rem;
      margin-top: 8px;
    }

    .ok { color: var(--ok); }
    .err { color: var(--danger); }

    .form-grid { display: grid; gap: 8px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1 class="title">Foodies Store</h1>
    <div class="pill">
      <label for="userId"><strong>User</strong></label>
      <input id="userId" value="demo-user" style="width:180px" />
      <button class="secondary" id="refreshBtn">Refresh</button>
    </div>
  </div>

  <div class="grid">
    <div class="stack">
      <section class="card">
        <h2>Products</h2>
        <div id="products" class="products"></div>
      </section>

      <section class="card">
        <h2>Add Product</h2>
        <div class="form-grid">
          <input id="pName" placeholder="Name" />
          <textarea id="pDesc" placeholder="Description"></textarea>
          <input id="pImage" placeholder="Image URL" />
          <input id="pPrice" type="number" min="0.01" step="0.01" placeholder="Price" />
          <button id="createProductBtn">Create Product</button>
        </div>
      </section>
    </div>

    <div class="stack">
      <section class="card">
        <h2>Cart</h2>
        <div id="cartItems"></div>
        <div class="row space"><strong>Total</strong><strong id="cartTotal">$0.00</strong></div>
        <div class="row" style="margin-top:10px">
          <button class="success" id="checkoutBtn">Checkout</button>
        </div>
      </section>

      <section class="card">
        <h2>Orders</h2>
        <div id="orders"></div>
      </section>

      <div id="status" class="status"></div>
    </div>
  </div>
</div>

<script>
  const productsEl = document.getElementById('products');
  const cartItemsEl = document.getElementById('cartItems');
  const cartTotalEl = document.getElementById('cartTotal');
  const ordersEl = document.getElementById('orders');
  const statusEl = document.getElementById('status');
  const userIdEl = document.getElementById('userId');

  const currency = (n) => `$${Number(n || 0).toFixed(2)}`;

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg || '';
    statusEl.className = `status ${isError ? 'err' : 'ok'}`;
  }

  function api(path, options = {}) {
    const headers = Object.assign(
      { 'Content-Type': 'application/json', 'X-User-Id': userIdEl.value || 'demo-user' },
      options.headers || {}
    );
    return fetch(path, { ...options, headers }).then(async (res) => {
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `Request failed: ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    });
  }

  async function loadProducts() {
    const products = await api('/api/products', { method: 'GET' });
    productsEl.innerHTML = '';

    if (!products.length) {
      productsEl.innerHTML = '<p class="muted">No products yet.</p>';
      return;
    }

    products.forEach((product) => {
      const el = document.createElement('article');
      el.className = 'product';
      el.innerHTML = `
        <img src="${product.imageUrl}" alt="${product.name}" loading="lazy" />
        <div class="content">
          <strong>${product.name}</strong>
          <div class="muted">${product.description}</div>
          <div class="row space">
            <strong>${currency(product.price)}</strong>
            <button data-id="${product.id}">Add</button>
          </div>
        </div>
      `;

      el.querySelector('button').addEventListener('click', async () => {
        try {
          await api('/api/cart/items', {
            method: 'POST',
            body: JSON.stringify({ productId: product.id, quantity: 1 })
          });
          await loadCart();
          setStatus(`Added ${product.name} to cart`);
        } catch (err) {
          setStatus(err.message, true);
        }
      });

      productsEl.appendChild(el);
    });
  }

  async function loadCart() {
    const cart = await api('/api/cart', { method: 'GET' });
    cartItemsEl.innerHTML = '';

    if (!cart.items || !cart.items.length) {
      cartItemsEl.innerHTML = '<p class="muted">Cart is empty.</p>';
      cartTotalEl.textContent = currency(0);
      return;
    }

    cart.items.forEach((item) => {
      const itemEl = document.createElement('div');
      itemEl.className = 'cart-item';
      itemEl.innerHTML = `
        <div class="row space"><strong>${item.productName}</strong><strong>${currency(item.lineTotal)}</strong></div>
        <div class="row">
          <label>Qty</label>
          <input type="number" min="1" value="${item.quantity}" style="width:90px" />
          <button class="secondary">Update</button>
          <button class="danger">Remove</button>
        </div>
      `;

      const qtyInput = itemEl.querySelector('input');
      const updateBtn = itemEl.querySelector('.secondary');
      const removeBtn = itemEl.querySelector('.danger');

      updateBtn.addEventListener('click', async () => {
        try {
          await api(`/api/cart/items/${item.productId}`, {
            method: 'PUT',
            body: JSON.stringify({ quantity: Number(qtyInput.value) })
          });
          await loadCart();
          setStatus('Cart updated');
        } catch (err) {
          setStatus(err.message, true);
        }
      });

      removeBtn.addEventListener('click', async () => {
        try {
          await api(`/api/cart/items/${item.productId}`, { method: 'DELETE' });
          await loadCart();
          setStatus('Item removed');
        } catch (err) {
          setStatus(err.message, true);
        }
      });

      cartItemsEl.appendChild(itemEl);
    });

    cartTotalEl.textContent = currency(cart.total);
  }

  async function loadOrders() {
    const orders = await api('/api/orders', { method: 'GET' });
    ordersEl.innerHTML = '';

    if (!orders.length) {
      ordersEl.innerHTML = '<p class="muted">No orders placed yet.</p>';
      return;
    }

    orders.forEach((order) => {
      const el = document.createElement('div');
      el.className = 'cart-item';
      el.innerHTML = `
        <div class="row space"><strong>Order ${order.id.slice(-6)}</strong><strong>${currency(order.total)}</strong></div>
        <div class="muted">${new Date(order.createdAt).toLocaleString()} | ${order.status}</div>
      `;
      ordersEl.appendChild(el);
    });
  }

  async function refreshAll() {
    try {
      await Promise.all([loadProducts(), loadCart(), loadOrders()]);
      setStatus('Loaded');
    } catch (err) {
      setStatus(err.message, true);
    }
  }

  document.getElementById('checkoutBtn').addEventListener('click', async () => {
    try {
      await api('/api/cart/checkout', { method: 'POST' });
      await refreshAll();
      setStatus('Checkout complete');
    } catch (err) {
      setStatus(err.message, true);
    }
  });

  document.getElementById('createProductBtn').addEventListener('click', async () => {
    const payload = {
      name: document.getElementById('pName').value,
      description: document.getElementById('pDesc').value,
      imageUrl: document.getElementById('pImage').value,
      price: Number(document.getElementById('pPrice').value)
    };
    try {
      await api('/api/products', { method: 'POST', body: JSON.stringify(payload) });
      document.getElementById('pName').value = '';
      document.getElementById('pDesc').value = '';
      document.getElementById('pImage').value = '';
      document.getElementById('pPrice').value = '';
      await loadProducts();
      setStatus('Product created');
    } catch (err) {
      setStatus(err.message, true);
    }
  });

  document.getElementById('refreshBtn').addEventListener('click', refreshAll);

  refreshAll();
</script>
</body>
</html>
