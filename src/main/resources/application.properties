spring.application.name=foodiesapi
#mongodb config
spring.data.mongodb.uri=mongodb://localhost:27017/foodies

#aws s3 config
aws.access.key=${AWS_ACCESS_KEY:}
aws.secret.key=${AWS_SECRET_KEY:}
aws.region=eu-north-1
aws.s3.bucketname=foodies-foodmia

#multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#cors config
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*,https://*.vercel.app,http://192.168.*:*,http://10.*.*.*:*}
